<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>HYDRA Module</title>
</head>
<body style="color: white; background-color: black;">
<script>
function print_str(str) {
	document.getElementById("output").innerHTML += str + "<br />";
}
function print_hex(name, buffer) {
	let str = name + ": ";
	for (let i = 0; i < buffer.length; ++i)
		str += buffer[i].toString(16).padStart(2, '0').toUpperCase();
	print_str(str);
}
function print_ms(name, start, end) {
	print_str(name + ": " + (end - start).toFixed(2) + " ms");
}
WebAssembly.instantiateStreaming(fetch("hydra.wasm"))
	.then(obj => {
		const wasm = obj.instance.exports;
		buffer = wasm.memory.buffer;
		//console.log(wasm);
		let message = new Uint8Array(buffer, wasm.message, 42);
		for (let i = 0; i < message.length; ++i)
			message[i] = Math.trunc(Math.random() * 256);
		print_hex("Message", message);
		let start = performance.now();
		wasm.digest_message(message.length, 16);
		end = performance.now();
		print_ms("digest_message", start, end);
		let digest = new Uint8Array(buffer, wasm.digest, 16);
		print_hex("Digest", digest);
		let height = 3;
		let leafs = 1 << height;
		let block = new Uint8Array(buffer, wasm.block, 1024);
		let blocks = new Uint8Array(buffer, wasm.blocks, block.length * leafs);
		for (let i = 0; i < blocks.length; ++i)
			blocks[i] = Math.trunc(Math.random() * 256);
		start = performance.now();
		let ret = wasm.digest_blocks(height, block.length, 16);
		print_str("ret = " + ret);
		end = performance.now();
		print_ms("digest_blocks", start, end);
		let proof = new Uint8Array(buffer, wasm.proof, 16*(height+1));
		for (let i = 0; i < leafs; ++i) {
			wasm.extract_proof(height, block.length, 16, i);
			//proof[Math.trunc(Math.random() * proof.length)] ^= 1 << Math.trunc(Math.random() * 8);
			//block[Math.trunc(Math.random() * block.length)] ^= 1 << Math.trunc(Math.random() * 8);
			ret = wasm.verify_proof(height, block.length, 16, i);
			print_str("ret = " + ret);
		}
	});
</script>
